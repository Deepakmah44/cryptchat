<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle matching the theme color -->
  <rect width="512" height="512" rx="128" fill="#0a0a1a" />
  
  <!-- Glowing Hexagon Grid / Cyber lock graphic -->
  <g transform="translate(256, 256) scale(3.5)" filter="url(#glow)">
    <path d="M 0,-45 L 38.9,-22.5 L 38.9,22.5 L 0,45 L -38.9,22.5 L -38.9,-22.5 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="4.5" stroke-linejoin="round" />
    <!-- Lock details inside -->
    <rect x="-15" y="-3" width="30" height="24" rx="4" fill="none" stroke="url(#shieldGrad)" stroke-width="4" />
    <path d="M -8,-3 V -10 C -8,-15 8,-15 8,-10 V -3" fill="none" stroke="url(#shieldGrad)" stroke-width="4" stroke-linecap="round" />
    <circle cx="0" cy="7" r="2.5" fill="url(#shieldGrad)" />
    <line x1="0" y1="9.5" x2="0" y2="15" stroke="url(#shieldGrad)" stroke-width="2.5" stroke-linecap="round" />
  </g>
</svg>
